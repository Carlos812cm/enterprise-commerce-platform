name: PR Validation

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: pr-validation-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  SOLUTION_FILE: EnterpriseCommercePlatform.slnx
  OTEL_COLLECTOR_IMAGE: otel/opentelemetry-collector-contrib:0.156.0
  PROMETHEUS_IMAGE: prom/prometheus:v3.13.0

jobs:
  validate:
    name: Restore, format, build, test
    runs-on: ubuntu-latest
    timeout-minutes: 50

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Display .NET info
        run: dotnet --info

      - name: Restore dependencies in locked mode
        run: dotnet restore "$SOLUTION_FILE" --locked-mode

      - name: Verify formatting
        run: >
          dotnet format "$SOLUTION_FILE"
          --verify-no-changes
          --verbosity diagnostic
          --no-restore

      - name: Build solution
        run: >
          dotnet build "$SOLUTION_FILE"
          --configuration Release
          --no-restore

      - name: Run tests
        run: >
          dotnet test "$SOLUTION_FILE"
          --configuration Release
          --no-restore
      - name: Validate Docker Compose configuration
        run: docker compose config > /dev/null

      - name: Validate observability Compose configuration
        run: >
          docker compose
          -f docker-compose.yml
          -f deploy/compose/observability.yml
          config
          > /dev/null
      - name: Validate OpenTelemetry Collector configuration
        shell: bash
        run: |
          docker run --rm \
            --volume "$GITHUB_WORKSPACE/deploy/observability/otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml:ro" \
            "$OTEL_COLLECTOR_IMAGE" \
            validate \
            --config=/etc/otelcol-contrib/config.yaml

      - name: Validate Prometheus configuration
        shell: bash
        run: |
          docker run --rm \
            --entrypoint /bin/promtool \
            --volume "$GITHUB_WORKSPACE/deploy/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro" \
            "$PROMETHEUS_IMAGE" \
            check config \
            /etc/prometheus/prometheus.yml

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build API container image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: src/Hosts/Commerce.Api/Dockerfile
          pull: true
          load: true
          push: false
          tags: enterprise-commerce-api:ci

      - name: Build Worker container image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: src/Hosts/Commerce.Worker/Dockerfile
          pull: true
          load: true
          push: false
          tags: enterprise-commerce-worker:ci

      - name: Smoke test container images
        shell: bash
        run: |
          set -Eeuo pipefail

          cleanup() {
            docker rm --force \
              commerce-api-smoke \
              commerce-worker-smoke \
              >/dev/null 2>&1 || true
          }

          trap cleanup EXIT

          api_user="$(
            docker image inspect \
              enterprise-commerce-api:ci \
              --format '{{.Config.User}}'
          )"

          worker_user="$(
            docker image inspect \
              enterprise-commerce-worker:ci \
              --format '{{.Config.User}}'
          )"

          if [[ -z "$api_user" || "$api_user" == "0" || "$api_user" == "root" ]]; then
            echo "API image must run as a non-root user."
            exit 1
          fi

          if [[ -z "$worker_user" || "$worker_user" == "0" || "$worker_user" == "root" ]]; then
            echo "Worker image must run as a non-root user."
            exit 1
          fi

          docker run \
            --detach \
            --name commerce-api-smoke \
            --publish 5000:8080 \
            --cap-drop ALL \
            --security-opt no-new-privileges:true \
            enterprise-commerce-api:ci

          docker run \
            --detach \
            --name commerce-worker-smoke \
            --cap-drop ALL \
            --security-opt no-new-privileges:true \
            enterprise-commerce-worker:ci

          api_health=""

          for attempt in $(seq 1 30); do
            api_health="$(
              docker inspect \
                --format '{{.State.Health.Status}}' \
                commerce-api-smoke \
                2>/dev/null || true
            )"

            if [[ "$api_health" == "healthy" ]]; then
              break
            fi

            if [[ "$api_health" == "unhealthy" ]]; then
              docker logs commerce-api-smoke
              exit 1
            fi

            sleep 1
          done

          if [[ "$api_health" != "healthy" ]]; then
            docker logs commerce-api-smoke
            echo "API container did not become healthy."
            exit 1
          fi

          curl \
            --fail \
            --silent \
            --show-error \
            http://127.0.0.1:5000/health/live

          worker_running="$(
            docker inspect \
              --format '{{.State.Running}}' \
              commerce-worker-smoke
          )"

          if [[ "$worker_running" != "true" ]]; then
            docker logs commerce-worker-smoke
            echo "Worker container is not running."
            exit 1
          fi