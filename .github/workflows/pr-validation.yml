name: PR Validation

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: pr-validation-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  SOLUTION_FILE: EnterpriseCommercePlatform.slnx
  OTEL_COLLECTOR_IMAGE: otel/opentelemetry-collector-contrib:0.156.0
  PROMETHEUS_IMAGE: prom/prometheus:v3.13.0

jobs:
  validate:
    name: Restore, format, build, test
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Display .NET info
        run: dotnet --info

      - name: Restore dependencies in locked mode
        run: dotnet restore "$SOLUTION_FILE" --locked-mode

      - name: Verify formatting
        run: >
          dotnet format "$SOLUTION_FILE"
          --verify-no-changes
          --verbosity diagnostic
          --no-restore

      - name: Build solution
        run: >
          dotnet build "$SOLUTION_FILE"
          --configuration Release
          --no-restore

      - name: Run tests
        run: >
          dotnet test "$SOLUTION_FILE"
          --configuration Release
          --no-restore

      - name: Validate Docker Compose configuration
        run: docker compose config > /dev/null

      - name: Validate observability Compose configuration
        run: >
          docker compose
          -f docker-compose.yml
          -f deploy/compose/observability.yml
          config
          > /dev/null

      - name: Validate OpenTelemetry Collector configuration
        shell: bash
        run: |
          docker run --rm \
            --volume "$GITHUB_WORKSPACE/deploy/observability/otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml:ro" \
            "$OTEL_COLLECTOR_IMAGE" \
            validate \
            --config=/etc/otelcol-contrib/config.yaml

      - name: Validate Prometheus configuration
        shell: bash
        run: |
          docker run --rm \
            --entrypoint /bin/promtool \
            --volume "$GITHUB_WORKSPACE/deploy/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro" \
            "$PROMETHEUS_IMAGE" \
            check config \
            /etc/prometheus/prometheus.yml

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build API container image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: src/Hosts/Commerce.Api/Dockerfile
          pull: true
          load: true
          push: false
          tags: enterprise-commerce-api:ci

      - name: Build Worker container image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: src/Hosts/Commerce.Worker/Dockerfile
          pull: true
          load: true
          push: false
          tags: enterprise-commerce-worker:ci

      - name: Smoke test container images
        shell: bash
        env:
          API_IMAGE: enterprise-commerce-api:ci
          WORKER_IMAGE: enterprise-commerce-worker:ci
        run: bash scripts/ci/smoke-containers.sh

      - name: Upload container smoke diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: container-smoke-diagnostics
          path: artifacts/smoke
          if-no-files-found: warn
          retention-days: 7
